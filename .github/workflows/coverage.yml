name: Coverage Report

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      coverage_threshold:
        description: 'Minimum coverage threshold (%)'
        required: false
        default: '60'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  GO_VERSION: '1.26.x'
  COVERAGE_THRESHOLD: ${{ github.event.inputs.coverage_threshold || '60' }}

jobs:
  # ============================================================================
  # Coverage Analysis
  # ============================================================================
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go ${{ env.GO_VERSION }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download
    
    - name: Generate coverage profile
      run: |
        # Generate coverage profile with race detection
        go test -race -coverprofile=coverage.out -covermode=atomic ./pkg/...
        
        # Also generate coverage for examples
        go test -coverprofile=coverage-examples.out -covermode=atomic ./examples/... 2>&1 || true
      shell: bash
    
    - name: Calculate coverage
      id: calc
      run: |
        # Get total coverage percentage
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "total_coverage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
        
        echo "## 📊 Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Total Coverage:** ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Check threshold
        if (( $(echo "$COVERAGE < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
          echo "⚠️ Coverage (${COVERAGE}%) is below threshold (${{ env.COVERAGE_THRESHOLD }}%)" >> $GITHUB_STEP_SUMMARY
          echo "below_threshold=true" >> $GITHUB_OUTPUT
        else
          echo "✅ Coverage (${COVERAGE}%) meets threshold (${{ env.COVERAGE_THRESHOLD }}%)" >> $GITHUB_STEP_SUMMARY
          echo "below_threshold=false" >> $GITHUB_OUTPUT
        fi
        
        # Show detailed breakdown
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Package Coverage" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Package | Coverage |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
        go tool cover -func=coverage.out | grep -E "^github.com|total" | while read line; do
          pkg=$(echo "$line" | awk '{print $1}')
          cov=$(echo "$line" | awk '{print $3}')
          if [ "$pkg" != "total:" ]; then
            echo "| $pkg | $cov |" >> $GITHUB_STEP_SUMMARY
          fi
        done
      shell: bash
    
    - name: Generate HTML report
      run: |
        go tool cover -html=coverage.out -o coverage.html
        
        # Create detailed report
        cat > coverage-report.md << 'EOF'
        # Code Coverage Report
        
        Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        Commit: ${{ github.sha }}
        
        ## Summary
        
        Total Coverage: ${{ env.COVERAGE }}%
        
        EOF
        
        echo "## Detailed Breakdown" >> coverage-report.md
        echo "" >> coverage-report.md
        echo "\`\`\`" >> coverage-report.md
        go tool cover -func=coverage.out >> coverage-report.md
        echo "\`\`\`" >> coverage-report.md
      shell: bash
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    
    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          coverage.out
          coverage.html
          coverage-report.md
        retention-days: 30
    
    - name: Comment PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v8
      with:
        script: |
          const fs = require('fs');
          const coverage = process.env.COVERAGE || 'unknown';
          const threshold = '${{ env.COVERAGE_THRESHOLD }}';
          
          // Read detailed coverage
          let details = '';
          try {
            details = fs.readFileSync('coverage.out', 'utf8').split('\n').slice(0, 50).join('\n');
          } catch (e) {
            details = 'Could not read coverage details';
          }
          
          const belowThreshold = parseFloat(coverage) < parseFloat(threshold);
          const statusEmoji = belowThreshold ? '⚠️' : '✅';
          
          const body = `## ${statusEmoji} Code Coverage Report
          
          **Total Coverage:** ${coverage}%
          **Threshold:** ${threshold}%
          
          ${belowThreshold ? `⚠️ Coverage is below the threshold of ${threshold}%` : `✅ Coverage meets the threshold`}
          
          <details>
          <summary>View Details</summary>
          
          See the full coverage report in the [Actions artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          </details>
          `;
          
          // Find existing comment
          const { data: comments } = await github.rest.issues.listComments({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo
          });
          
          const botComment = comments.find(comment => 
            comment.user.type === 'Bot' && 
            comment.body.includes('Code Coverage Report')
          );
          
          if (botComment) {
            await github.rest.issues.updateComment({
              comment_id: botComment.id,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          }
    
    - name: Fail on low coverage
      if: steps.calc.outputs.below_threshold == 'true'
      run: |
        echo "::error::Coverage (${{ env.COVERAGE }}%) is below threshold (${{ env.COVERAGE_THRESHOLD }}%)"
        exit 1
      shell: bash

  # ============================================================================
  # Coverage Trend Analysis
  # ============================================================================
  coverage-trend:
    name: Coverage Trend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go ${{ env.GO_VERSION }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    
    - name: Download current coverage
      uses: actions/download-artifact@v4
      with:
        name: coverage-report
        path: current-coverage
    
    - name: Generate coverage trend
      run: |
        echo "# 📈 Coverage Trend" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Get current coverage
        CURRENT=$(go tool cover -func=current-coverage/coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "**Current Coverage:** ${CURRENT}%" >> $GITHUB_STEP_SUMMARY
        
        # Try to get previous coverage from git history
        git checkout HEAD~1 -- . 2>/dev/null || true
        go test -coverprofile=previous.out ./pkg/... 2>/dev/null || true
        
        if [ -f previous.out ]; then
          PREVIOUS=$(go tool cover -func=previous.out | grep total | awk '{print $3}' | sed 's/%//')
          DIFF=$(echo "$CURRENT - $PREVIOUS" | bc)
          
          if (( $(echo "$DIFF > 0" | bc -l) )); then
            echo "📈 Coverage increased by ${DIFF}%" >> $GITHUB_STEP_SUMMARY
          elif (( $(echo "$DIFF < 0" | bc -l) )); then
            echo "📉 Coverage decreased by ${DIFF}%" >> $GITHUB_STEP_SUMMARY
          else
            echo "➡️ Coverage unchanged" >> $GITHUB_STEP_SUMMARY
          fi
        fi
      shell: bash
      continue-on-error: true
