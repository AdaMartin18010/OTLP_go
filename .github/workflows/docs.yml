name: Documentation

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

permissions:
  contents: read

jobs:
  # ============================================================================
  # Markdown Lint
  # ============================================================================
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
        continue-on-error: true

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: |
          markdownlint '**/*.md' \
            --ignore 'node_modules/**' \
            --ignore 'vendor/**' \
            --ignore '.git/**' \
            --config /dev/stdin << 'EOF' || true
          {
            "default": true,
            "MD013": {
              "line_length": 120,
              "heading_line_length": 120,
              "code_block_line_length": 120,
              "tables": false
            },
            "MD024": {
              "siblings_only": true
            },
            "MD041": false
          }
          EOF

      - name: Check markdown style (strict)
        run: |
          # Run with stricter rules for critical issues only
          markdownlint '**/*.md' \
            --ignore 'node_modules/**' \
            --ignore 'vendor/**' \
            --ignore '.git/**' \
            --config /dev/stdin << 'EOF' || EXIT_CODE=$?
          {
            "default": false,
            "MD009": true,
            "MD010": true,
            "MD011": true,
            "MD018": true,
            "MD019": true,
            "MD022": true,
            "MD023": true,
            "MD027": true,
            "MD028": true,
            "MD031": true,
            "MD032": true,
            "MD035": true,
            "MD037": true,
            "MD038": true,
            "MD039": true,
            "MD047": true
          }
          EOF
          
          if [ "${EXIT_CODE:-0}" -ne 0 ] && [ "${EXIT_CODE:-0}" -ne 1 ]; then
            exit 1
          fi
        continue-on-error: true

  # ============================================================================
  # Link Check
  # ============================================================================
  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --config .github/lychee.toml
            --exclude-path node_modules
            --exclude-path vendor
            --exclude-all-private
            --exclude "localhost"
            --exclude "127\\.0\\.0\\.1"
            --exclude "0\\.0\\.0\\.0"
            --exclude "^https?://example\\.com"
            --exclude "^https?://example\\.org"
            --exclude "^https?://your-"
            --exclude "^https?://\\*"
            --timeout 30
            --retry 3
            --max-concurrency 10
            '**/*.md'
            'docs/**/*.md'
        continue-on-error: true

      - name: Check internal links (strict)
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --offline
            --exclude-path node_modules
            --exclude-path vendor
            '**/*.md'

      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: lychee/out.md
          retention-days: 30

  # ============================================================================
  # Spell Check
  # ============================================================================
  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install cspell
        run: npm install -g cspell

      - name: Run spell check
        run: |
          cspell lint '**/*.md' \
            --config /dev/stdin \
            --no-progress \
            --show-suggestions \
            --exclude 'node_modules/**' \
            --exclude 'vendor/**' \
            --exclude '.git/**' << 'EOF'
          {
            "version": "0.2",
            "language": "en",
            "words": [
              "OTLP",
              "OpenTelemetry",
              "golangci",
              "stretchr",
              "otelhttp",
              "otlpmetric",
              "otlptrace",
              "stdouttrace",
              "automaxprocs",
              "otelgrpc",
              "grpcgateway",
              "proto",
              "healthz",
              "pprof",
              "otelcol",
              "jaegertracing",
              "prometheus",
              "grafana",
              "zipkin",
              "timeseries",
              "fanout",
              "parallelization",
              " observability",
              "traceability",
              "gocolly",
              "colly",
              "chromedp",
              "goquery",
              "otelgin",
              "otelmongo",
              "otelsql",
              "otelredis"
            ],
            "ignorePaths": [
              "node_modules/**",
              "vendor/**",
              ".git/**",
              "go.mod",
              "go.sum"
            ]
          }
          EOF

      - name: Run codespell
        uses: codespell-project/actions-codespell@v2
        with:
          check_hidden: false
          check_filenames: true
          skip: '*.go,*.mod,*.sum,./vendor,./.git'
          ignore_words_list: 'otlp,OTLP,traceId,spanId'

  # ============================================================================
  # Documentation Build Test
  # ============================================================================
  docs-build:
    name: Docs Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install docsify-cli
        run: npm install -g docsify-cli
        continue-on-error: true

      - name: Check docs structure
        run: |
          echo "## Documentation Structure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          find docs -name '*.md' | head -50 >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total markdown files: $(find docs -name '*.md' 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY

      - name: Validate markdown frontmatter
        run: |
          # Check for common frontmatter issues
          for file in $(find docs -name '*.md' 2>/dev/null); do
            if head -1 "$file" | grep -q '^---$'; then
              if ! grep -q '^---$' "$file" | head -2 | tail -1; then
                echo "Warning: $file may have malformed frontmatter"
              fi
            fi
          done
        continue-on-error: true

  # ============================================================================
  # Documentation Stats
  # ============================================================================
  docs-stats:
    name: Documentation Statistics
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate statistics
        run: |
          echo "# 📚 Documentation Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Count files
          DOC_COUNT=$(find docs -name '*.md' 2>/dev/null | wc -l)
          MD_COUNT=$(find . -name '*.md' -not -path './node_modules/*' -not -path './vendor/*' -not -path './.git/*' | wc -l)
          
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation files (docs/) | $DOC_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Markdown files | $MD_COUNT |" >> $GITHUB_STEP_SUMMARY
          
          if [ $DOC_COUNT -gt 0 ]; then
            DOC_LINES=$(find docs -name '*.md' | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
            DOC_WORDS=$(find docs -name '*.md' | xargs wc -w 2>/dev/null | tail -1 | awk '{print $1}')
            echo "| Total lines (docs/) | $DOC_LINES |" >> $GITHUB_STEP_SUMMARY
            echo "| Total words (docs/) | $DOC_WORDS |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # List top 10 largest docs
          echo "## Largest Documentation Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          find docs -name '*.md' -exec wc -l {} + 2>/dev/null | sort -rn | head -10 | while read lines file; do
            if [ -n "$file" ] && [ "$file" != "total" ]; then
              echo "| $file | $lines |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [markdown-lint, link-check, spell-check, docs-build, docs-stats]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Documentation Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          
          for job in markdown-lint link-check spell-check docs-build docs-stats; do
            case $job in
              markdown-lint) result="${{ needs.markdown-lint.result }}" ;;
              link-check) result="${{ needs.link-check.result }}" ;;
              spell-check) result="${{ needs.spell-check.result }}" ;;
              docs-build) result="${{ needs.docs-build.result }}" ;;
              docs-stats) result="${{ needs.docs-stats.result }}" ;;
            esac
            
            if [ "$result" == "success" ]; then
              emoji="✅"
            elif [ "$result" == "failure" ]; then
              emoji="❌"
            else
              emoji="⚠️"
            fi
            echo "| $job | $emoji $result |" >> $GITHUB_STEP_SUMMARY
          done
