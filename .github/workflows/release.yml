name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
    
    - name: Build binaries
      run: |
        GOOS=linux GOARCH=amd64 go build -o bin/otlp-go-linux-amd64 ./src
        GOOS=darwin GOARCH=amd64 go build -o bin/otlp-go-darwin-amd64 ./src
        GOOS=windows GOARCH=amd64 go build -o bin/otlp-go-windows-amd64.exe ./src
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
