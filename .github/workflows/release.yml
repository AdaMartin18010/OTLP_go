name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  GO_VERSION: '1.25'

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  # ============================================================================
  # Test - Full test suite before release
  # ============================================================================
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run all tests
        run: go test -v -race -count=1 ./...

      - name: Run tests (short mode)
        run: go test -v -short -count=1 ./...

      - name: Generate coverage report
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

  # ============================================================================
  # Build - Cross-platform builds
  # ============================================================================
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - os: linux
            arch: amd64
            target: x86_64-unknown-linux-gnu
          - os: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - os: linux
            arch: arm
            target: armv7-unknown-linux-gnueabihf
          # macOS builds
          - os: darwin
            arch: amd64
            target: x86_64-apple-darwin
          - os: darwin
            arch: arm64
            target: aarch64-apple-darwin
          # Windows builds
          - os: windows
            arch: amd64
            target: x86_64-pc-windows-msvc
            ext: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.ref_name }}"
          COMMIT="${{ github.sha }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          LDFLAGS="-s -w \
            -X main.Version=$VERSION \
            -X main.Commit=$COMMIT \
            -X main.BuildDate=$DATE"
          
          mkdir -p dist
          
          # Build examples
          for dir in examples/*/; do
            if [ -f "$dir/main.go" ]; then
              example_name=$(basename "$dir")
              output_name="otlp-go-${example_name}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
              echo "Building $output_name..."
              go build -ldflags="$LDFLAGS" -o "dist/$output_name" "./${dir}/main.go"
            fi
          done
          
          # Build main src binaries
          for file in src/*.go; do
            if grep -q "^package main" "$file" 2>/dev/null; then
              binary_name=$(basename "$file" .go)
              output_name="otlp-go-${binary_name}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
              echo "Building src/$file -> dist/$output_name..."
              go build -ldflags="$LDFLAGS" -o "dist/$output_name" "$file" || true
            fi
          done
          
          ls -la dist/

      - name: Create checksums
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows" ]; then
            sha256sum *.exe > "checksums-${{ matrix.os }}-${{ matrix.arch }}.txt"
          else
            sha256sum otlp-go-* > "checksums-${{ matrix.os }}-${{ matrix.arch }}.txt"
          fi
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 30

  # ============================================================================
  # Docker Release
  # ============================================================================
  docker:
    name: Docker Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ============================================================================
  # Release - Create GitHub release with artifacts
  # ============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, docker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binaries-*

      - name: Organize artifacts
        run: |
          mkdir -p release-assets
          
          # Copy all binaries and checksums
          find artifacts -type f -exec cp {} release-assets/ \;
          
          # Create source archives
          git archive --format=tar.gz -o "release-assets/otlp-go-${{ github.ref_name }}.tar.gz" "${{ github.ref_name }}"
          git archive --format=zip -o "release-assets/otlp-go-${{ github.ref_name }}.zip" "${{ github.ref_name }}"
          
          ls -la release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            # First release
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..HEAD")
          fi
          
          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -E "^.*feat(\([^)]+\))?:" || true)
          FIXES=$(echo "$COMMITS" | grep -E "^.*fix(\([^)]+\))?:" || true)
          DOCS=$(echo "$COMMITS" | grep -E "^.*docs(\([^)]+\))?:" || true)
          OTHER=$(echo "$COMMITS" | grep -v -E "^.*(feat|fix|docs)(\([^)]+\))?:" || true)
          
          # Generate changelog
          cat > CHANGELOG.md << 'EOF'
          ## What's Changed
          
          EOF
          
          if [ -n "$FEATURES" ]; then
            echo "### 🚀 Features" >> CHANGELOG.md
            echo "$FEATURES" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi
          
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> CHANGELOG.md
            echo "$FIXES" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi
          
          if [ -n "$DOCS" ]; then
            echo "### 📚 Documentation" >> CHANGELOG.md
            echo "$DOCS" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi
          
          if [ -n "$OTHER" ]; then
            echo "### 🔧 Other Changes" >> CHANGELOG.md
            echo "$OTHER" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi
          
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-${{ github.sha }}}...${{ github.ref_name }}" >> CHANGELOG.md
          
          cat CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release summary
        run: |
          echo "# 🎉 Release ${{ github.ref_name }} Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Assets" >> $GITHUB_STEP_SUMMARY
          echo "| Asset | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------------|" >> $GITHUB_STEP_SUMMARY
          for file in release-assets/*; do
            name=$(basename "$file")
            size=$(du -h "$file" | cut -f1)
            echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "```bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
