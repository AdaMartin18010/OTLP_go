name: CI

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: '1.26.x'

jobs:
  # ============================================================================
  # Build and Test
  # ============================================================================
  build:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go ${{ env.GO_VERSION }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download
    
    - name: Verify go.mod
      run: |
        go mod verify
        go work sync
      shell: bash
    
    - name: Check formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "❌ Code needs formatting:"
          gofmt -s -l .
          exit 1
        fi
        echo "✅ Code formatting is correct"
      shell: bash
    
    - name: Run go vet
      run: go vet ./...
    
    - name: Build
      run: |
        go build -v ./pkg/...
        go build -v ./examples/...
      shell: bash

  # ============================================================================
  # Unit Tests
  # ============================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go ${{ env.GO_VERSION }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run tests
      run: |
        go test -v -count=1 ./pkg/...
        go test -v -count=1 ./examples/...
      shell: bash
    
    - name: Run tests with race detector
      run: |
        go test -race -v -count=1 ./pkg/...
        go test -race -v -count=1 ./examples/...
      shell: bash
      timeout-minutes: 15

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go ${{ env.GO_VERSION }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run integration tests
      run: |
        # Run tests with longer timeout for integration scenarios
        go test -v -timeout=10m -tags=integration ./pkg/... 2>&1 || true
      shell: bash
      continue-on-error: true
    
    - name: Test build examples
      run: |
        for dir in examples/*/; do
          if [ -f "$dir/main.go" ]; then
            echo "Building example: $dir"
            (cd "$dir" && go build -o /dev/null .)
          fi
        done
      shell: bash
      continue-on-error: true

  # ============================================================================
  # Lint
  # ============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go ${{ env.GO_VERSION }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=10m --skip-dirs=docs,archive --verbose
        skip-cache: false
    
    - name: Run go vet (additional checks)
      run: |
        go vet -all ./pkg/...
        go vet -shadow ./pkg/... 2>&1 || true
      shell: bash
      continue-on-error: true

  # ============================================================================
  # Module Check
  # ============================================================================
  mod-check:
    name: Module Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go ${{ env.GO_VERSION }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    
    - name: Check go.mod tidy
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum
      shell: bash
    
    - name: Check for deprecated packages
      run: |
        go list -u -m -json all | go-mod-outdated -update -direct 2>&1 || true
      shell: bash
      continue-on-error: true
    
    - name: Verify dependencies
      run: |
        go mod verify
        go mod graph | head -20
      shell: bash

  # ============================================================================
  # Quick Benchmark (Smoke Test)
  # ============================================================================
  quick-benchmark:
    name: Quick Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go ${{ env.GO_VERSION }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run quick benchmarks
      run: |
        go test -bench=. -benchtime=100ms -count=1 -benchmem ./pkg/concurrency/... 2>&1 | head -50
        go test -bench=. -benchtime=100ms -count=1 -benchmem ./pkg/pool/... 2>&1 | head -50
      shell: bash
      continue-on-error: true

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build, test, integration-test, lint, mod-check, quick-benchmark]
    if: always()
    
    steps:
    - name: Generate summary
      run: |
        echo "# 🔧 CI Workflow Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        
        jobs=("build" "test" "integration-test" "lint" "mod-check" "quick-benchmark")
        for job in "${jobs[@]}"; do
          case $job in
            build) result="${{ needs.build.result }}" ;;
            test) result="${{ needs.test.result }}" ;;
            integration-test) result="${{ needs.integration-test.result }}" ;;
            lint) result="${{ needs.lint.result }}" ;;
            mod-check) result="${{ needs.mod-check.result }}" ;;
            quick-benchmark) result="${{ needs.quick-benchmark.result }}" ;;
          esac
          
          if [ "$result" == "success" ]; then
            emoji="✅"
          elif [ "$result" == "failure" ]; then
            emoji="❌"
          elif [ "$result" == "skipped" ]; then
            emoji="⏭️"
          else
            emoji="⚠️"
          fi
          echo "| $job | $emoji $result |" >> $GITHUB_STEP_SUMMARY
        done
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Go Version:** ${{ env.GO_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
      shell: bash
